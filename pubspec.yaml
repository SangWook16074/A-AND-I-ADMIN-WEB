name: a_and_i_admin_web_serivce
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

workspace:
  - packages/api_protocol
  - packages/auth
  - packages/admin_api
  - packages/tech_blog

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  aandi_auth:
    path: packages/auth
  aandi_admin_api:
    path: packages/admin_api
  aandi_course_api:
    path: packages/course_api
  aandi_oj_api:
    path: packages/oj_api
  firebase_core: ^3.15.2
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  dio: ^5.9.2
  code_text_field: ^1.1.0
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_code_editor: ^0.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.6
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  flutterfire_cli: ^1.2.0
  melos: ^7.4.0

melos:
  command:
    version:
      branch: main
      fetchTags: true
      workspaceChangelog: true
  scripts:
    bootstrap: melos bootstrap
    analyze: melos exec -- "dart analyze ."
    test: melos exec -c 1 --fail-fast -- "flutter test"
    release_version: melos version --all
    release_version_and_push_tags: melos version --all && git push && git push --tags
    sync_packages: bash scripts/sync_package_repos.sh --require-all
    release_and_sync_packages: melos version --all && bash scripts/sync_package_repos.sh --require-all

flutter:
  uses-material-design: true

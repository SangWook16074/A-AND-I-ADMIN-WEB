name: a_and_i_admin_web_workspace

packages:
  - packages/*

scripts:
  pub:get:
    description: Run pub get in every local package.
    run: melos exec -- "dart pub get"

  analyze:
    description: Analyze every local package.
    run: melos exec --fail-fast -- "dart analyze ."

  format:
    description: Format all local package source files.
    run: melos exec -- "dart format lib test"

  test:
    description: Run package test suites where test directories exist.
    run: melos exec --fail-fast --dir-exists=test -- "dart test"

  build:
    description: Run code generation in packages that use build_runner.
    run: melos exec --fail-fast --depends-on=build_runner -- "dart run build_runner build --delete-conflicting-outputs"
